# Keep the JVM catalog service small and directly scrapeable.
quarkus.application.name=catalog-jvm
quarkus.http.port=8080

# Expose Prometheus metrics for the D6 Hardened application patterns and
# D8 Governance and observability proof paths.
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Use the same uncached product-route baseline cost as the native catalog path, then
# derive the fault delays from that one value.
aprf.catalog.status-baseline-delay-ms=225
