# Keep the native catalog service scrapeable and configurable through the
# workload ConfigMap.
quarkus.application.name=catalog-native
quarkus.http.port=8080

# Expose Prometheus metrics for the D8 Governance and observability alert and
# corrective-action story.
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# The cache path is disabled at baseline and can be enabled through the bounded
# D8 Governance and observability corrective Git change.
aprf.catalog.cache-enabled=${APRF_CATALOG_CACHE_ENABLED:false}
aprf.catalog.status-baseline-delay-ms=${APRF_CATALOG_STATUS_BASELINE_DELAY_MS:225}

# Keep the bounded cache settings explicit for readers of the source tree.
quarkus.cache.caffeine."catalog-status".expire-after-write=30s
quarkus.cache.caffeine."catalog-status".maximum-size=1000
