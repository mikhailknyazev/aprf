quarkus.application.name=experience-jvm
quarkus.http.port=8080

# Expose Prometheus metrics for the product-view path and the fault-test route.
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Resolve the downstream service through the in-cluster Service name.
catalog/mp-rest/url=${CATALOG_MP_REST_URL:http://catalog-jvm.catalog-jvm.svc.cluster.local:8080}
