# Keep the native experience service scrapeable while it uses the hardened
# dependency client.
quarkus.application.name=experience-native
quarkus.http.port=8080

# Expose Prometheus metrics for the routed native product-view path.
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Resolve the downstream service through the in-cluster Service name.
catalog/mp-rest/url=${CATALOG_MP_REST_URL:http://catalog-native.catalog-native.svc.cluster.local:8080}
