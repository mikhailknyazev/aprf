# Monitoring rules for the JVM experience service and its routed fault-test
# path.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "64700"
  labels:
    app.kubernetes.io/name: experience-jvm
    openshift.io/user-monitoring: "true"
    openshift.io/prometheus-rule-evaluation-scope: leaf-prometheus
  name: experience-jvm
spec:
  groups:
    - name: experience-jvm.rules
      rules:
        - alert: ExperienceJvmScrapeTargetDown
          expr: max by (namespace) (up{namespace="experience-jvm"}) < 1
          for: 5m
          labels:
            severity: warning
            app: experience-jvm
          annotations:
            summary: experience-jvm metrics target is down
            description: User-workload Prometheus has not scraped experience-jvm in namespace experience-jvm for 5 minutes.
        # This is the direct fault-route alert used in the simpler JVM
        # D8 Governance and observability path.
        - alert: ExperienceJvmFaultRouteLatencyHigh
          expr: >-
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(http_server_requests_seconds_bucket{namespace="experience-jvm",uri="/product-views/{productId}/fault-test/{faultType}",method="GET"}[2m])
              )
            ) > 0.20
          for: 2m
          labels:
            severity: warning
            app: experience-jvm
          annotations:
            summary: experience-jvm fault route latency is high
            description: The p95 latency for the experience-jvm fault route stayed above 200ms for at least 2 minutes.
