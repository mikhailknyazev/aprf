# Local copy of the routed JVM experience workload and its direct
# D8 Governance and observability fault-alert path.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: experience-jvm
resources:
  - imagestream.yaml
  - configmap.yaml
  - networkpolicy.yaml
  - deployment.yaml
  - poddisruptionbudget.yaml
  - service.yaml
  - route.yaml
  - servicemonitor.yaml
  - prometheusrule.yaml
